<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="description" content="Play minecraft 1.8 in your browser" />
		<meta name="keywords" content="eaglercraft, eaglercraftx, minecraft, 1.8, 1.8.8" />
		<title>EaglercraftX 1.8</title>
		<meta property="og:locale" content="en-US" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="EaglercraftX 1.8" />
		<meta property="og:description" content="Play minecraft 1.8 in your browser" />
		<meta property="og:image" content="favicon.png" />
		<link type="image/png" rel="shortcut icon" href="favicon.png" />
		<style>
			#fullscreen-btn {
				display: none;
				position: absolute;
				bottom: 20px;
				right: 20px;
				padding: 10px 20px;
				background-color: rgba(0, 0, 0, 0.7);
				color: white;
				border: 2px solid white;
				border-radius: 5px;
				font-family: sans-serif;
				font-size: 16px;
				z-index: 9999;
				cursor: pointer;
			}
			@media (pointer: coarse), (max-width: 768px) {
				#fullscreen-btn {
					display: block;
				}
			}
			:fullscreen #fullscreen-btn {
				display: none;
			}
			:-webkit-full-screen #fullscreen-btn {
				display: none;
			}
		</style>
		<script type="text/javascript" src="classes.js"></script>
		<script type="text/javascript">
			function enterFullscreen() {
				var elem = document.documentElement;
				var promise = null;
				if (elem.requestFullscreen) {
					promise = elem.requestFullscreen();
				} else if (elem.webkitRequestFullscreen) { /* Safari */
					promise = elem.webkitRequestFullscreen();
				} else if (elem.msRequestFullscreen) { /* IE11 */
					promise = elem.msRequestFullscreen();
				}

				if (promise !== null && promise !== undefined) {
					promise.then(function() {
						if (screen.orientation && screen.orientation.lock) {
							screen.orientation.lock("landscape").catch(function(error) {
								console.log("Orientation lock failed: ", error);
							});
						}
					}).catch(function(error) {
						console.log("Fullscreen request failed: ", error);
					});
				} else {
					// Fallback if promise is not returned (e.g. older webkit)
					if (screen.orientation && screen.orientation.lock) {
						screen.orientation.lock("landscape").catch(function(error) {
							console.log("Orientation lock failed: ", error);
						});
					}
				}
			}
		</script>
		<script type="text/javascript">
			"use strict";
			window.addEventListener("load", function() {
				if(window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
				}else {
					
					// %%%%%%%%% launch options %%%%%%%%%%%%
					
					var relayId = Math.floor(Math.random() * 3);
					window.eaglercraftXOpts = {
						demoMode: false,
						container: "game_frame",
						assetsURI: "assets.epk",
						localesURI: "lang/",
						worldsDB: "worlds",
						servers: [
							/* example: { addr: "ws://localhost:8081/", name: "Local test server" } */
						],
						relays: [
							{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
							{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
							{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }
						]
					};
					
					// %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
					
					var q = window.location.search;
					if((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
						q = new window.URLSearchParams(q);
						var s = q.get("server");
						if(s) window.eaglercraftXOpts.joinServer = s;
					}
					
					main();
					
				}
			});
		</script>
	</head>
	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;">
		<div id="game_frame" style="width:100%;height:100%;"></div>
		<button id="fullscreen-btn" onclick="enterFullscreen()">Fullscreen</button>
	</body>
</html>
